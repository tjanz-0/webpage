<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thorge Janz — Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        system-ui, sans-serif;
    }

    body.no-scroll {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* --- HEADER --- */
    .site-header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);

      width: 100%;
      max-width: 1200px;
      padding: 28px 40px;

      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;

      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;

      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(6px);
    }

    .site-title {
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 11px;
    }

    .nav-links a {
      opacity: 0.6;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    /* --- LAYOUT --- */
    main {
      padding-top: 120px;
      padding-bottom: 120px;
    }

    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* --- GALLERY GRID --- */
    .work-section {
      margin-bottom: 160px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 24px;
      justify-items: center;
      align-items: flex-start;
    }

    .gallery-item {
      width: 100%;
      max-width: 210px;
      cursor: pointer;
      overflow: hidden;
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: transform 0.25s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    /* --- ABOUT SECTION --- */
    #about {
      max-width: 520px;
      margin: 0 auto;   /* centered */
      text-align: center;
      font-size: 14px;
      line-height: 1.7;
      color: #444444;
    }

    .about-heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
      opacity: 0.6;
    }

    .about-section p {
      margin: 0 0 12px;
    }

    /* --- LIGHTBOX --- */

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 50;
    }

    .lightbox.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-inner {
      position: relative;
      width: 70vw;
      max-width: 1100px;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      color: #f5f5f5;
      font-size: 13px;
    }

    .lightbox-media {
      flex: 3;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lightbox-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      transform-origin: center center;
      transition: transform 0.1s ease-out;
    }

    .lightbox-meta {
      flex: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 20px;
      padding-bottom: 12px;
    }

    .zoom-controls {
      margin-top: 20px;
      display: inline-flex;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .zoom-button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      padding: 4px 10px;
      color: #f5f5f5;
      cursor: pointer;
    }

    /* --- MEDIA QUERIES --- */
    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .lightbox-inner {
        width: 85vw;
        height: 70vh;
      }
    }

    @media (max-width: 768px) {
      .site-header {
        padding: 20px 18px;
      }

      .content {
        padding: 0 18px;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      main {
        padding-top: 96px;
      }

      .lightbox-inner {
        flex-direction: column;
        width: 90vw;
        height: 80vh;
        gap: 16px;
      }

      .lightbox-meta {
        width: 100%;
        padding-top: 0;
      }
    }
  </style>
</head>

  <!-- SCRIPT (unchanged) -->
  <script>
    (function () {
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const lightboxClose = document.getElementById("lightboxClose");
      const lightboxTitle = document.getElementById("lightboxTitle");
      const lightboxDescription = document.getElementById("lightboxDescription");
      const lightboxMedia = document.getElementById("lightboxMedia");

      const zoomInBtn = document.getElementById("zoomIn");
      const zoomOutBtn = document.getElementById("zoomOut");
      const zoomResetBtn = document.getElementById("zoomReset");

      let currentZoom = 1;
      const minZoom = 1;
      const maxZoom = 3;
      const zoomStep = 0.25;

      function applyZoom() {
        lightboxImage.style.transform = `scale(${currentZoom})`;
        if (currentZoom > 1) {
          lightboxMedia.style.overflow = "auto";
          lightboxImage.style.cursor = "grab";
        } else {
          lightboxMedia.scrollTop = 0;
          lightboxMedia.scrollLeft = 0;
          lightboxMedia.style.overflow = "hidden";
          lightboxImage.style.cursor = "default";
        }
      }

      function resetZoom() {
        currentZoom = 1;
        applyZoom();
      }

      document.addEventListener("click", function (event) {
        const img = event.target.closest(".gallery-item img");
        if (!img) return;

        lightboxImage.src = img.src;
        lightboxTitle.textContent = img.dataset.title || img.alt || "";
        lightboxDescription.textContent = img.dataset.description || "";

        resetZoom();
        lightbox.classList.add("is-visible");
        document.body.classList.add("no-scroll");
      });

      function closeLightbox() {
        lightbox.classList.remove("is-visible");
        lightboxImage.src = "";
        document.body.classList.remove("no-scroll");
      }

      lightboxClose.addEventListener("click", function (event) {
        event.stopPropagation();
        closeLightbox();
      });

      lightbox.addEventListener("click", function (event) {
        if (event.target === lightbox) closeLightbox();
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closeLightbox();
      });

      zoomInBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        currentZoom = Math.min(maxZoom, currentZoom + zoomStep);
        applyZoom();
      });

      zoomOutBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        currentZoom = Math.max(minZoom, currentZoom - zoomStep);
        applyZoom();
      });

      zoomResetBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        resetZoom();
      });
    })();
  </script>
